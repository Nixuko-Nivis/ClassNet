<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理系统 - ClassNet</title>
    <!-- Bulma CSS -->
    <link rel="stylesheet" href="../../public/bulma/css/bulma.min.css">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="../../public/fontawesome/css/all.min.css">
    <!-- 自定义样式 -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="admin-body">
    <div class="admin-container">
        <!-- 侧边栏 -->
        <aside class="admin-sidebar collapsed">
            <div class="sidebar-header">
                <h1 class="sidebar-title">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>后台管理</span>
                </h1>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li class="nav-item active" data-page="dashboard">
                        <a href="#">
                            <i class="fas fa-home"></i>
                            <span>仪表盘</span>
                        </a>
                    </li>
                    <li class="nav-item" data-page="users">
                        <a href="#">
                            <i class="fas fa-users"></i>
                            <span>用户管理</span>
                        </a>
                    </li>
                    <li class="nav-item" data-page="settings">
                        <a href="#">
                            <i class="fas fa-cog"></i>
                            <span>系统设置</span>
                        </a>
                    </li>
                    <li class="nav-item" data-page="logs">
                        <a href="#">
                            <i class="fas fa-file-alt"></i>
                            <span>系统日志</span>
                        </a>
                    </li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <button class="logout-btn" id="logout-btn">
                    <i class="fas fa-desktop"></i>
                    <span>返回桌面</span>
                </button>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="admin-content">
            <!-- 顶部导航栏 -->
            <header class="content-header">
                <div class="header-left">
                    <button class="sidebar-toggle" id="sidebar-toggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h2 class="page-title" id="page-title">仪表盘</h2>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <span class="user-name" id="user-name">管理员</span>
                        <div class="user-avatar">
                            <i class="fas fa-user-shield"></i>
                        </div>
                    </div>
                </div>
            </header>

            <!-- 页面内容 -->
            <div class="content-pages">
                <!-- 仪表盘页面 -->
                <div class="content-page" id="dashboard-page">
                    <div class="dashboard-cards">
                        <div class="card">
                            <div class="card-content">
                                <div class="card-icon">
                                    <i class="fas fa-users"></i>
                                </div>
                                <div class="card-text">
                                    <h3>用户总数</h3>
                                    <p class="card-value" id="total-users">0</p>
                                </div>
                            </div>
                        </div>

                    </div>
                    <div class="dashboard-stats">
                        <div class="stats-card">
                            <h3>系统状态</h3>
                            <div class="stats-grid">
                                <div class="stat-item">
                                    <span class="stat-label">CPU使用率</span>
                                    <span class="stat-value" id="cpu-usage">0%</span>
                                </div>
                                <div class="stat-item">
                                    <span class="stat-label">内存使用率</span>
                                    <span class="stat-value" id="memory-usage">0%</span>
                                </div>
                                <div class="stat-item">
                                    <span class="stat-label">磁盘使用率</span>
                                    <span class="stat-value" id="disk-usage">0%</span>
                                </div>
                                <div class="stat-item">
                                    <span class="stat-label">服务器时间</span>
                                    <span class="stat-value" id="server-time">--</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 用户管理页面 -->
                <div class="content-page" id="users-page" style="display: none;">
                    <div class="users-header">
                        <h3>用户管理</h3>
                        <div class="users-actions">
                            <div class="search-box">
                                <input type="text" id="user-search" placeholder="搜索用户...">
                                <button class="search-btn">
                                    <i class="fas fa-search"></i>
                                </button>
                            </div>
                            <button class="button is-primary" id="add-user-btn">
                                <i class="fas fa-plus"></i>
                                <span>添加用户</span>
                            </button>
                        </div>
                    </div>
                    <div class="users-table-container">
                        <table class="table is-fullwidth is-hoverable">
                            <thead>
                                <tr>
                                    <th>用户ID</th>
                                    <th>用户名</th>
                                    <th>真实姓名</th>
                                    <th>邮箱</th>
                                    <th>手机号</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="users-table-body">
                                <!-- 用户数据将通过JavaScript动态添加 -->
                                <tr>
                                    <td colspan="6" class="has-text-centered">
                                        <div class="loading-spinner"></div>
                                        <p>加载用户数据中...</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- 系统设置页面 -->
                <div class="content-page" id="settings-page" style="display: none;">
                    <div class="settings-header">
                        <h3>系统设置</h3>
                    </div>
                    <div class="settings-form">
                        <form id="settings-form">
                            <div class="form-section">
                                <h4>基本设置</h4>
                                <div class="field">
                                    <label class="label">系统名称</label>
                                    <div class="control">
                                        <input class="input" type="text" id="system-name" value="ClassNet">
                                    </div>
                                </div>
                                <div class="field">
                                    <label class="label">系统版本</label>
                                    <div class="control">
                                        <input class="input is-static" type="text" value="1.0.0" disabled>
                                    </div>
                                </div>
                            </div>
                            <div class="form-section">
                                <h4>安全设置</h4>
                                <div class="field">
                                    <label class="label">后台管理密码</label>
                                    <div class="control password-input">
                                        <input class="input" type="password" id="admin-password" placeholder="输入新的后台管理密码">
                                        <button type="button" class="toggle-password">
                                            <i class="fas fa-eye"></i>
                                        </button>
                                    </div>
                                </div>
                                <div class="field">
                                    <label class="label">密码有效期</label>
                                    <div class="control">
                                        <input class="input" type="number" id="password-expiry" value="90">
                                    </div>
                                    <p class="help">密码有效期（天）</p>
                                </div>
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="button is-primary">保存设置</button>
                                <button type="button" class="button is-light">取消</button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- 系统日志页面 -->
                <div class="content-page" id="logs-page" style="display: none;">
                    <div class="logs-header">
                        <h3>系统日志</h3>
                        <div class="logs-actions">
                            <button class="button is-light" id="refresh-logs">
                                <i class="fas fa-sync-alt"></i>
                                <span>刷新</span>
                            </button>
                            <button class="button is-light" id="download-logs">
                                <i class="fas fa-download"></i>
                                <span>下载</span>
                            </button>
                        </div>
                    </div>
                    <div class="logs-container">
                        <div class="logs-filter">
                            <div class="field is-grouped">
                                <div class="field">
                                    <label class="label">日志级别</label>
                                    <div class="control">
                                        <div class="select">
                                            <select id="log-level">
                                                <option value="all">全部</option>
                                                <option value="info">信息</option>
                                                <option value="warning">警告</option>
                                                <option value="error">错误</option>
                                                <option value="critical">严重</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                                <div class="field">
                                    <label class="label">时间范围</label>
                                    <div class="control">
                                        <input class="input" type="date" id="log-date">
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="logs-content" id="logs-content">
                            <div class="loading-spinner"></div>
                            <p>加载日志数据中...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 模态框 -->
    <!-- 添加/编辑用户模态框 -->
    <div class="modal" id="user-modal">
        <div class="modal-background"></div>
        <div class="modal-content">
            <div class="modal-card">
                <header class="modal-card-head">
                    <p class="modal-card-title" id="modal-title">添加用户</p>
                    <button class="delete" aria-label="close"></button>
                </header>
                <form id="user-form">
                    <section class="modal-card-body">
                        <input type="hidden" id="user-id">
                        <div class="field">
                            <label class="label">用户名</label>
                            <div class="control">
                                <input class="input" type="text" id="user-username" required>
                            </div>
                            <div class="error-message"></div>
                        </div>
                        <div class="field">
                            <label class="label">真实姓名</label>
                            <div class="control">
                                <input class="input" type="text" id="user-realname" required>
                            </div>
                            <div class="error-message"></div>
                        </div>
                        <div class="field">
                            <label class="label">邮箱</label>
                            <div class="control">
                                <input class="input" type="email" id="user-email">
                            </div>
                            <div class="error-message"></div>
                        </div>
                        <div class="field">
                            <label class="label">密码</label>
                            <div class="control password-input">
                                <input class="input" type="password" id="user-password">
                                <button type="button" class="toggle-password">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <div class="error-message"></div>
                            <p class="help">留空则不修改密码</p>
                        </div>
                        <div class="field">
                            <label class="label">手机号</label>
                            <div class="control">
                                <input class="input" type="tel" id="user-phone">
                            </div>
                            <div class="error-message"></div>
                        </div>
                    </section>
                    <footer class="modal-card-foot">
                        <button type="button" class="button is-light">取消</button>
                        <button type="submit" class="button is-primary">保存</button>
                    </footer>
                </form>
            </div>
        </div>
        <button class="modal-close is-large" aria-label="close"></button>
    </div>

    <!-- 确认模态框 -->
    <div class="modal" id="confirm-modal">
        <div class="modal-background"></div>
        <div class="modal-content">
            <div class="modal-card">
                <header class="modal-card-head">
                    <p class="modal-card-title" id="confirm-title">确认操作</p>
                    <button class="delete" aria-label="close"></button>
                </header>
                <section class="modal-card-body">
                    <p id="confirm-message">您确定要执行此操作吗？</p>
                </section>
                <footer class="modal-card-foot">
                    <button class="button is-light" id="confirm-cancel">取消</button>
                    <button class="button is-danger" id="confirm-ok">确定</button>
                </footer>
            </div>
        </div>
        <button class="modal-close is-large" aria-label="close"></button>
    </div>

    <!-- 加载遮罩 -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-spinner"></div>
        <p>加载中...</p>
    </div>

    <!-- 通知组件 -->
    <div class="notification" id="notification">
        <div class="notification-content">
            <i class="notification-icon"></i>
            <span class="notification-message"></span>
        </div>
        <button class="delete"></button>
    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>
</body>
</html>
