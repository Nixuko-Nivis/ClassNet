<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>ClassNet - 登录/注册</title>
    <!-- Bulma CSS -->
    <link rel="stylesheet" href="../public/bulma/css/bulma.min.css">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="../public/fontawesome/css/all.min.css">
    <!-- 认证页面样式 -->
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* 页面背景 */
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        /* 页面加载动画 */
        .page-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            transition: all 0.5s ease;
        }
        
        .page-loader.hidden {
            opacity: 0;
            visibility: hidden;
        }
        
        .loader-logo {
            font-size: 3rem;
            font-weight: bold;
            color: #3B82F6;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.1);
                opacity: 0.8;
            }
        }
        
        /* 认证容器 */
        .auth-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            perspective: 1000px;
        }
        
        /* 认证卡片 */
        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            transition: all 0.3s ease;
            transform-style: preserve-3d;
        }
        
        .auth-card:hover {
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            transform: translateY(-5px);
        }
        
        /* 认证头部 */
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .auth-title {
            font-size: 2.5rem;
            font-weight: bold;
            color: #3B82F6;
            margin-bottom: 10px;
        }
        
        .auth-subtitle {
            font-size: 1rem;
            color: #6B7280;
        }
        
        /* 认证标签 */
        .auth-tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 1px solid #E5E7EB;
        }
        
        .auth-tab {
            flex: 1;
            background: none;
            border: none;
            padding: 15px;
            font-size: 1rem;
            font-weight: 500;
            color: #6B7280;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .auth-tab:hover {
            color: #3B82F6;
        }
        
        .auth-tab.active {
            color: #3B82F6;
            font-weight: 600;
        }
        
        .auth-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 3px;
            background: #3B82F6;
            border-radius: 3px;
        }
        
        /* 表单容器 */
        .form-container {
            position: relative;
        }
        
        /* 表单面板 */
        .form-panel {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        
        .form-panel.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 表单字段 */
        .field {
            margin-bottom: 20px;
        }
        
        .label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #374151;
            margin-bottom: 8px;
        }
        
        .control {
            position: relative;
        }
        
        .input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
        }
        
        .input:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            background: #FFFFFF;
        }
        
        /* 密码输入框 */
        .password-input {
            position: relative;
        }
        
        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #6B7280;
            cursor: pointer;
            padding: 8px;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        
        .toggle-password:hover {
            color: #3B82F6;
            background: rgba(59, 130, 246, 0.1);
        }
        
        /* 错误信息 */
        .error-message {
            font-size: 0.75rem;
            color: #EF4444;
            margin-top: 5px;
            opacity: 0;
            transform: translateY(-5px);
            transition: all 0.3s ease;
        }
        
        .error-message.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* 密码强度指示器 */
        .password-strength {
            margin-top: 10px;
        }
        
        .password-strength-label {
            font-size: 0.75rem;
            color: #6B7280;
            margin-bottom: 5px;
        }
        
        .password-strength-bars {
            display: flex;
            gap: 5px;
            margin-bottom: 5px;
        }
        
        .password-strength-bar {
            flex: 1;
            height: 4px;
            background: #E5E7EB;
            border-radius: 2px;
            transition: all 0.3s ease;
        }
        
        .password-strength-bar.weak {
            background: #EF4444;
        }
        
        .password-strength-bar.medium {
            background: #F59E0B;
        }
        
        .password-strength-bar.strong {
            background: #10B981;
        }
        
        .password-strength-text {
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        .password-strength-text.weak {
            color: #EF4444;
        }
        
        .password-strength-text.medium {
            color: #F59E0B;
        }
        
        .password-strength-text.strong {
            color: #10B981;
        }
        
        /* 复选框 */
        .checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        
        .checkbox input[type="checkbox"] {
            width: auto;
            cursor: pointer;
        }
        
        /* 按钮 */
        .button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .button.is-primary {
            background: #3B82F6;
            color: #FFFFFF;
        }
        
        .button.is-primary:hover {
            background: #2563EB;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        
        .button.is-primary:active {
            transform: translateY(0);
        }
        
        .button.is-loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        /* 加载遮罩 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #E5E7EB;
            border-top: 4px solid #3B82F6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .auth-card {
                padding: 25px;
            }
            
            .auth-title {
                font-size: 2rem;
            }
            
            .auth-tab {
                padding: 12px;
                font-size: 0.875rem;
            }
            
            .field {
                margin-bottom: 15px;
            }
            
            .input {
                padding: 10px 12px;
                font-size: 0.875rem;
            }
            
            .button {
                padding: 10px;
                font-size: 0.875rem;
            }
        }
        
        /* 可访问性 */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
    </style>
</head>
<body>
    <!-- 页面加载动画 -->
    <div class="page-loader" id="page-loader">
        <div class="loader-logo">ClassNet</div>
    </div>
    
    <div class="auth-container">
        <div class="auth-card" role="main" aria-labelledby="auth-title">
            <div class="auth-header">
                <h1 class="auth-title" id="auth-title">ClassNet</h1>
                <p class="auth-subtitle">班级网络系统</p>
            </div>
            
            <div class="auth-tabs" role="tablist" aria-label="认证方式">
                <button class="auth-tab active" data-tab="login" role="tab" aria-selected="true" aria-controls="login-form">登录</button>
                <button class="auth-tab" data-tab="register" role="tab" aria-selected="false" aria-controls="register-form">注册</button>
            </div>
            
            <div class="form-container">
                <!-- 登录表单 -->
                <form class="form-panel active" id="login-form" role="form" aria-labelledby="login-form-title">
                    <h2 class="sr-only" id="login-form-title">登录表单</h2>
                    <div class="field">
                        <label class="label" for="login-username">用户名/真实姓名</label>
                        <div class="control">
                            <input class="input" type="text" id="login-username" placeholder="请输入用户名或真实姓名" required autofocus aria-required="true">
                        </div>
                        <div class="error-message" aria-live="polite"></div>
                    </div>
                    <div class="field">
                        <label class="label" for="login-password">密码</label>
                        <div class="control password-input">
                            <input class="input" type="password" id="login-password" placeholder="请输入密码" required aria-required="true">
                            <button type="button" class="toggle-password" aria-label="切换密码可见性" aria-pressed="false">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="error-message" aria-live="polite"></div>
                    </div>
                    <div class="field">
                        <div class="control">
                            <label class="checkbox">
                                <input type="checkbox" id="remember-me">
                                <span>记住我</span>
                            </label>
                        </div>
                    </div>
                    <div class="field">
                        <button type="submit" class="button is-primary" aria-label="登录">登录</button>
                    </div>
                </form>
                
                <!-- 注册表单 -->
                <form class="form-panel" id="register-form" role="form" aria-labelledby="register-form-title">
                    <h2 class="sr-only" id="register-form-title">注册表单</h2>
                    <div class="field">
                        <label class="label" for="register-username">用户名</label>
                        <div class="control">
                            <input class="input" type="text" id="register-username" placeholder="请输入用户名" required aria-required="true">
                        </div>
                        <div class="error-message" aria-live="polite"></div>
                    </div>
                    <div class="field">
                        <label class="label" for="register-realname">真实姓名</label>
                        <div class="control">
                            <input class="input" type="text" id="register-realname" placeholder="请输入真实姓名" required aria-required="true">
                        </div>
                        <div class="error-message" aria-live="polite"></div>
                    </div>
                    <div class="field">
                        <label class="label" for="register-password">密码</label>
                        <div class="control password-input">
                            <input class="input" type="password" id="register-password" placeholder="请输入密码（至少8位）" required aria-required="true">
                            <button type="button" class="toggle-password" aria-label="切换密码可见性" aria-pressed="false">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="error-message" aria-live="polite"></div>
                        <!-- 密码强度指示器 -->
                        <div class="password-strength" id="password-strength" aria-live="polite">
                            <div class="password-strength-label">密码强度：</div>
                            <div class="password-strength-bars">
                                <div class="password-strength-bar" data-index="0" aria-hidden="true"></div>
                                <div class="password-strength-bar" data-index="1" aria-hidden="true"></div>
                                <div class="password-strength-bar" data-index="2" aria-hidden="true"></div>
                                <div class="password-strength-bar" data-index="3" aria-hidden="true"></div>
                            </div>
                            <div class="password-strength-text" id="password-strength-text">弱</div>
                        </div>
                    </div>
                    <div class="field">
                        <label class="label" for="register-confirm-password">确认密码</label>
                        <div class="control password-input">
                            <input class="input" type="password" id="register-confirm-password" placeholder="请再次输入密码" required aria-required="true">
                            <button type="button" class="toggle-password" aria-label="切换密码可见性" aria-pressed="false">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="error-message" aria-live="polite"></div>
                    </div>
                    <div class="field">
                        <button type="submit" class="button is-primary" aria-label="注册">注册</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <!-- 加载遮罩 -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-spinner"></div>
    </div>
    
    <!-- 认证页面脚本 -->
    <script src="script.js"></script>
</body>
</html>
